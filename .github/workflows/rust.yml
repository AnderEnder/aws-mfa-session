name: Rust

on:
  push:
    branches:
      - "*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on:  ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest, macos-15-intel, windows-11-arm, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: dtolnay/rust-toolchain@stable
      - name: build
        run: cargo build --verbose
      - name: test
        run: cargo test --no-fail-fast --verbose --all -- --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: trace

  msrv:
    # Verifies the rust-version declared in Cargo.toml still builds, and flags
    # drift when an AWS SDK dependency raises its MSRV.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git
            target
          key: msrv-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install MSRV toolchain (1.91.1)
        uses: dtolnay/rust-toolchain@1.91.1
      - name: cargo check on MSRV
        run: cargo check --locked --all-targets
